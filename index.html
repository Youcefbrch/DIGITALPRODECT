<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الرقمي - منتجات رقمية مميزة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <h2>🛒 متجري الرقمي</h2>
                </div>
                <ul class="nav-menu">
                    <li><a href="#home">الرئيسية</a></li>
                    <li><a href="#products">المنتجات</a></li>
                    <li><a href="#about">عن الموقع</a></li>
                    <li><a href="#contact">تواصل معنا</a></li>
                </ul>
                <div class="cart-icon">
                    <span id="cart-count">0</span>
                    <i class="fas fa-shopping-cart"></i>
                </div>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>مرحباً بك في متجرك الرقمي</h1>
            <p>احصل على أفضل المنتجات الرقمية بأسعار مميزة</p>
            <a href="#products" class="cta-button">تسوق الآن</a>
        </div>
    </section>

    <!-- Products Section -->
    <section id="products" class="products">
        <div class="container">
            <h2 class="section-title">منتجاتنا</h2>
            <div id="products-container" class="products-grid">
                <!-- المنتجات ستظهر هنا -->
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>سلة التسوق</h2>
            <div id="cart-items"></div>
            <div class="cart-total">
                <h3>الإجمالي: <span id="cart-total">0</span> ريال</h3>
                <button id="checkout-btn" class="checkout-btn">الدفع الآن</button>
            </div>
        </div>
    </div>

    <!-- Checkout Form -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>إتمام الطلب</h2>
            <form id="payment-form">
                <div id="payment-element">
                    <!-- Stripe Elements سيظهر هنا -->
                </div>
                <button id="submit-payment" class="submit-payment">ادفع الآن</button>
                <div id="payment-message"></div>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>لوحة التحكم</h2>
            <div class="admin-form">
                <input type="text" id="product-name" placeholder="اسم المنتج">
                <input type="number" id="product-price" placeholder="السعر">
                <input type="file" id="product-image" accept="image/*">
                <textarea id="product-desc" placeholder="وصف المنتج"></textarea>
                <input type="file" id="product-file" accept=".zip,.pdf,.mp3,.mp4">
                <button id="add-product">إضافة منتج</button>
            </div>
            <div id="admin-products"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 متجري الرقمي. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
